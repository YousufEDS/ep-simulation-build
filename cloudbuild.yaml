steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ep-simulation:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ep-simulation:$SHORT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ep-simulation:latest'

images:
  - 'gcr.io/$PROJECT_ID/ep-simulation:latest'
  - 'gcr.io/$PROJECT_ID/ep-simulation:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY